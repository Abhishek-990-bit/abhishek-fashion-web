apiVersion: apps/v1
kind: Deployment
metadata:
  name: abhishek-web-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-fashion-site
  template:
    metadata:
      labels:
        app: my-fashion-site
    spec:
      containers:
      - name: php-site
        # This is where we updated to the new code
        image: 481048082259.dkr.ecr.ap-south-1.amazonaws.com/abhishek-fashion-web:v3
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: abhishek-web-service
spec:
  type: LoadBalancer
  selector:
    app: my-fashion-site
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80