name: Build and Deploy to EKS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4  # Upgraded to v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4 # Upgraded to v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2 # Upgraded to v2

    - name: Build and Push to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: abhishek-fashion-web
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    - name: Update Kubeconfig
      run: |
        aws eks update-kubeconfig --name abhishek-eks-cluster --region ap-south-1

    - name: Deploy to EKS
      run: |
        kubectl apply -f deployment.yaml
        kubectl rollout restart deployment abhishek-web-deployment