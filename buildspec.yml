version: 0.2

env:
  # Load the current version number from a parameter in Parameter Store
  parameter-store:
    ARTIFACT_VERSION: "/my-app/version"

phases:
  build:
    commands:
      # Set the artifact name using the current version number
      #- export ARTIFACT_NAME="my-app-$ARTIFACT_VERSION.jar"
      # Build the artifact using Maven
      #- mvn package -DartifactName="$ARTIFACT_NAME"
      
  post_build:
    commands:
      # Parse the current version number using awk
      - export MAJOR=$(echo $ARTIFACT_VERSION | awk -F. '{print $1}')
      - export MINOR=$(echo $ARTIFACT_VERSION | awk -F. '{print $2}')
      - export PATCH=$(echo $ARTIFACT_VERSION | awk -F. '{print $3}')
      # Check the input parameter to determine the type of PATCH
      - if [[ "$PATCH_TYPE" == "major" ]]; then export MAJOR=$(expr $MAJOR + 1); export MINOR=0; export PATCH=0; fi
      - if [[ "$PATCH_TYPE" == "minor" ]]; then export MINOR=$(expr $MINOR + 1); export PATCH=0; fi
      - if [[ "$PATCH_TYPE" == "patch" ]]; then export PATCH=$(expr $PATCH + 1); fi
      # Set the new version number using semantic versioning
      - export NEW_VERSION="$MAJOR.$MINOR.$PATCH"
      # Store the new version number in a parameter in Parameter Store
      - aws ssm put-parameter --name "/my-app/version" --value "$NEW_VERSION" --type "String" --overwrite
      - echo $NEW_VESION > version.txt
      - export VERSION=$(cat version.txt)
      # Zip the artifact and upload it to S3
      - zip -r my-app-$NEW_VERSION.zip .
      - aws s3 cp my-app-$NEW_VERSION.zip s3://pipeline-test-deep/Build_Artifact/
      
artifacts:
  files:
     - '**/*'
    # - location
  #name: $ARTIFACT_NAME
  